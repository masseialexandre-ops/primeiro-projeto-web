<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Terraria Pixel Teste</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: skyblue;
}

canvas {
    display: block;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Chão
const groundHeight = 100;

// Jogador
let player = {
    x: 200,
    y: canvas.height - groundHeight - 64,
    width: 32,
    height: 64,
    speed: 4,
    velocityY: 0,
    gravity: 0.5,
    jumping: false,
    frame: 0,
    frameTimer: 0
};

// Teclas
let keys = {};

document.addEventListener("keydown", e => {
    keys[e.key] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key] = false;
});

// Desenhar personagem pixelado
function drawPlayer() {

    ctx.fillStyle = "#8B4513"; // cabelo
    ctx.fillRect(player.x + 8, player.y, 16, 8);

    ctx.fillStyle = "#FFDAB9"; // cabeça
    ctx.fillRect(player.x + 8, player.y + 8, 16, 16);

    ctx.fillStyle = "#0000FF"; // corpo
    ctx.fillRect(player.x + 8, player.y + 24, 16, 20);

    ctx.fillStyle = "#654321"; // pernas

    if (player.frame === 0) {
        ctx.fillRect(player.x + 8, player.y + 44, 6, 20);
        ctx.fillRect(player.x + 18, player.y + 44, 6, 20);
    } else {
        ctx.fillRect(player.x + 6, player.y + 44, 6, 20);
        ctx.fillRect(player.x + 20, player.y + 44, 6, 20);
    }
}

// Atualizar movimento
function updatePlayer() {

    let moving = false;

    if (keys["ArrowRight"]) {
        player.x += player.speed;
        moving = true;
    }

    if (keys["ArrowLeft"]) {
        player.x -= player.speed;
        moving = true;
    }

    // Pulo
    if (keys[" "] && !player.jumping) {
        player.velocityY = -10;
        player.jumping = true;
    }

    // Gravidade
    player.velocityY += player.gravity;
    player.y += player.velocityY;

    // Colisão com chão
    if (player.y >= canvas.height - groundHeight - player.height) {
        player.y = canvas.height - groundHeight - player.height;
        player.velocityY = 0;
        player.jumping = false;
    }

    // Animação de andar
    if (moving) {
        player.frameTimer++;

        if (player.frameTimer > 10) {
            player.frame = player.frame === 0 ? 1 : 0;
            player.frameTimer = 0;
        }
    }
}

// Desenhar chão
function drawGround() {
    ctx.fillStyle = "green";
    ctx.fillRect(
        0,
        canvas.height - groundHeight,
        canvas.width,
        groundHeight
    );
}

// Loop do jogo
function gameLoop() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawGround();
    updatePlayer();
    drawPlayer();

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
